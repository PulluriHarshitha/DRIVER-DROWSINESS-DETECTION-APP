{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card border-0 shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 15px; backdrop-filter: blur(8px); background: rgba(255,255,255,0.15);">
    
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" width="60" class="mb-2">
      <h4 class="fw-bold text-white">Smart Driver Monitor</h4>
      <p class="text-light mb-0">Login to your dashboard</p>
    </div>

    <form method="post" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label for="username" class="form-label text-light fw-semibold">Username</label>
        <input type="text" class="form-control form-control-lg bg-light border-0" id="username" name="username" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label text-light fw-semibold">Password</label>
        <input type="password" class="form-control form-control-lg bg-light border-0" id="password" name="password" placeholder="Enter password" required>
      </div>
      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-warning btn-lg fw-bold shadow-sm">Login</button>
      </div>
    </form>

    <p class="text-center text-light mt-3 small mb-0">
      Don’t have an account? <a href="#" class="text-warning text-decoration-none">Request Access</a>
    </p>
  </div>
</div>
{% endblock %}
