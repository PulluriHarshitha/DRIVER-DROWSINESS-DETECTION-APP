<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Driver Monitoring System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Favicon -->
    <link rel="icon" type="images/png" href="{{ url_for('static', filename='images/car.png') }}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light" style="font-family: 'Poppins', sans-serif;">

<!-- ==================== Attractive Navbar ==================== -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold" href="{{ url_for('dashboard') }}">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" width="35" height="35" class="me-2">
      <span>Smart Driver Monitor</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item mx-2">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="bi bi-speedometer2"></i> Home
          </a>
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="{{ url_for('about') }}">
            <i class="bi bi-info-circle"></i> About
          </a>
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}" href="{{ url_for('contact') }}">
            <i class="bi bi-envelope"></i> Contact
          </a>
        </li>

        {% if session.get('user') %}
        <li class="nav-item mx-2">
          <a class="btn btn-outline-light btn-sm px-3" href="{{ url_for('logout') }}">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </li>
        {% else %}
        <li class="nav-item mx-2">
          <a class="btn btn-warning btn-sm px-3" href="{{ url_for('home') }}">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </a>
        </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<!-- Main content block -->
<main class="flex-fill">
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>
</main>

<!-- Footer -->
<footer class="mt-auto bg-dark text-light text-center py-3">
  <small>© {{ current_year | default(2025) }} Smart Driver Monitoring System | MINI PROJECT 07</small>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>
</html>
